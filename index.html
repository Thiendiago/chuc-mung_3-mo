<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>8/3 - Giai Điệu Yêu Thương</title>

<style>

body{
margin:0;
padding:0;
overflow:hidden;
background:linear-gradient(135deg,#fce4ec,#f8bbd0);
font-family:'Segoe UI',Tahoma;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
text-align:center;
z-index:100;
padding:40px;
background:rgba(255,255,255,0.6);
border-radius:50px;
backdrop-filter:blur(8px);
box-shadow:0 15px 35px rgba(233,30,99,0.2);
border:2px solid white;
max-width:80%;
}

h1{
color:#ad1457;
font-size:2.8rem;
margin-bottom:10px;
}

.gift-box{
font-size:130px;
cursor:pointer;
transition:0.4s;
}

.gift-box:hover{
transform:scale(1.15) rotate(-5deg);
}

#message{
display:none;
color:#880e4f;
font-size:1.6rem;
margin-top:25px;
line-height:1.5;
animation:fadeIn 1.5s;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(20px)}
to{opacity:1;transform:translateY(0)}
}

canvas{
position:fixed;
top:0;
left:0;
pointer-events:none;
}

</style>
</head>

<body>

<!-- nhạc youtube ẩn -->
<iframe id="musicPlayer"
width="0"
height="0"
style="display:none"
allow="autoplay">
</iframe>

<canvas id="fireworksCanvas"></canvas>

<div class="container">

<h1>Happy Women's Day!</h1>

<p id="guide" style="color:#c2185b;font-style:italic">
Chạm vào hộp quà để lắng nghe giai điệu... 🎵
</p>

<div class="gift-box" id="gift" onclick="openGift()">🎁</div>

<div id="message">
✨ 🌹 ✨<br>
Chúc ngày của ba mợ<br>
Chúc 3 mợ một ngày 8/3 thật hạnh phúc, xinh đẹp và rạng rỡ! <br>
và được yêu thương❤️
</div>

</div>

<script>

const canvas=document.getElementById("fireworksCanvas")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let particles=[]
const items=['❤️','💖','🌹','🌸','✨','💎']

class Particle{

constructor(x,y,type){

this.x=x
this.y=y
this.type=type
this.size=Math.random()*25+15
this.speedX=(Math.random()-0.5)*12
this.speedY=(Math.random()-0.5)*12-2
this.gravity=0.1
this.opacity=1
this.decay=Math.random()*0.01+0.005
this.emoji=items[Math.floor(Math.random()*items.length)]

}

draw(){

ctx.globalAlpha=this.opacity
ctx.font=this.size+"px Arial"
ctx.fillText(this.emoji,this.x,this.y)
ctx.globalAlpha=1

}

update(){

this.speedY+=this.gravity
this.x+=this.speedX
this.y+=this.speedY
this.opacity-=this.decay

}

}

function createExplosion(x,y){

for(let i=0;i<30;i++){
particles.push(new Particle(x,y))
}

}

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height)

for(let i=0;i<particles.length;i++){

particles[i].update()
particles[i].draw()

if(particles[i].opacity<=0){
particles.splice(i,1)
i--
}

}

requestAnimationFrame(animate)

}

function openGift(){

const gift=document.getElementById("gift")
const msg=document.getElementById("message")
const guide=document.getElementById("guide")
const music=document.getElementById("musicPlayer")

// phát nhạc youtube
if(!music.src){
music.src="https://www.youtube.com/embed/X64sa-qrQzA?autoplay=1&loop=1&playlist=X64sa-qrQzA"
}

// hiệu ứng mở quà
gift.innerHTML="💝"
gift.style.transform="scale(1.3)"

guide.style.display="none"
msg.style.display="block"

// pháo hoa
let count=0

const interval=setInterval(()=>{

createExplosion(Math.random()*window.innerWidth,
Math.random()*window.innerHeight)

count++

if(count>12)clearInterval(interval)

},250)

}

window.addEventListener("resize",()=>{

canvas.width=window.innerWidth
canvas.height=window.innerHeight

})

animate()

</script>

</body>
</html>
